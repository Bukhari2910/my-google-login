<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign in – Google Accounts</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #1a73e8;
      --blue-h: #1765cc;
      --red:    #ea4335;
      --yellow: #fbbc04;
      --green:  #34a853;
      --text:   #202124;
      --sub:    #5f6368;
      --border: #dadce0;
      --bg:     #f8f9fa;
      --white:  #ffffff;
    }

    html, body {
      height: 100%;
      font-family: 'Google Sans', 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 28px;
      width: 100%;
      max-width: 448px;
      padding: 48px 40px 36px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
      animation: rise .35s cubic-bezier(.4,0,.2,1) both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ── Logo ── */
    .logo {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }

    .logo svg { width: 75px; height: 24px; }

    /* ── Headings ── */
    h1 {
      font-size: 24px;
      font-weight: 400;
      text-align: center;
      color: var(--text);
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: var(--sub);
      text-align: center;
      margin-bottom: 32px;
    }

    /* ── Inputs ── */
    .field {
      position: relative;
      margin-bottom: 20px;
    }

    .field input {
      width: 100%;
      height: 56px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 14px 0;
      font-size: 16px;
      font-family: inherit;
      color: var(--text);
      background: transparent;
      outline: none;
      transition: border-color .15s;
    }

    .field input:focus { border-color: var(--blue); border-width: 2px; }
    .field input:focus + label,
    .field input:not(:placeholder-shown) + label {
      top: 8px;
      font-size: 12px;
      color: var(--blue);
    }

    .field label {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--sub);
      pointer-events: none;
      transition: all .15s;
      background: var(--white);
      padding: 0 2px;
    }

    .field input:not(:focus):not(:placeholder-shown) + label { color: var(--sub); }

    /* eye toggle */
    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--sub);
      padding: 4px;
      display: flex;
      align-items: center;
    }
    .eye-btn:hover { color: var(--text); }

    /* ── Forgot / helper links ── */
    .helper-links {
      margin-bottom: 28px;
    }

    .helper-links a {
      font-size: 14px;
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }

    .helper-links a:hover { text-decoration: underline; }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
    }

    .btn-create {
      background: none;
      border: none;
      color: var(--blue);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      padding: 10px 8px;
      border-radius: 4px;
      transition: background .15s;
    }

    .btn-create:hover { background: rgba(26,115,232,.08); }

    .btn-next {
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 4px;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
    }

    .btn-next:hover {
      background: var(--blue-h);
      box-shadow: 0 1px 3px rgba(0,0,0,.2);
    }

    .btn-next:active { background: #1558b0; }

    /* ── Divider ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0 16px;
      color: var(--sub);
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Google button ── */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px;
      background: var(--white);
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      color: var(--text);
      cursor: pointer;
      transition: background .15s, box-shadow .15s;
    }
    .btn-google:hover {
      background: var(--bg);
      box-shadow: 0 1px 3px rgba(0,0,0,.1);
    }

    /* ── Footer ── */
    footer {
      margin-top: 32px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    footer a {
      font-size: 12px;
      color: var(--sub);
      text-decoration: none;
    }

    footer a:hover { text-decoration: underline; }

    /* ── Password show/hide ── */
    #password { padding-right: 44px; }
  </style>
</head>
<body>

<div class="card">

  <!-- Google Logo -->
  <div class="logo">
    <svg viewBox="0 0 75 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <text x="0" y="22" font-family="'Google Sans', sans-serif" font-size="22" font-weight="700">
        <tspan fill="#4285F4">G</tspan><tspan fill="#EA4335">o</tspan><tspan fill="#FBBC05">o</tspan><tspan fill="#4285F4">g</tspan><tspan fill="#34A853">l</tspan><tspan fill="#EA4335">e</tspan>
      </text>
    </svg>
  </div>

  <h1>Sign in</h1>
  <p class="subtitle">Use your Google Account</p>

  <!-- Email field -->
  <div class="field">
    <input type="email" id="email" placeholder=" " autocomplete="email" />
    <label for="email">Email or phone</label>
  </div>

  <!-- Forgot email -->
  <div class="helper-links">
    <a href="#">Forgot email?</a>
  </div>

  <p style="font-size:14px;color:var(--sub);margin-bottom:24px;line-height:1.6;">
    Not your computer? Use a Private Window to sign in.
    <a href="#" style="color:var(--blue);font-weight:500;text-decoration:none;">Learn more</a>
  </p>

  <!-- Password field (hidden initially) -->
  <div class="field" id="password-wrap" style="display:none;">
    <input type="password" id="password" placeholder=" " autocomplete="current-password" />
    <label for="password">Enter your password</label>
    <button class="eye-btn" id="eye-btn" type="button" aria-label="Show password">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
        <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
    </button>
  </div>

  <!-- Forgot password (hidden initially) -->
  <div class="helper-links" id="forgot-wrap" style="display:none;">
    <a href="#">Forgot password?</a>
  </div>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn-create" type="button">Create account</button>
    <button class="btn-next" type="button" id="next-btn">Next</button>
  </div>

  <div class="divider">or</div>

  <!-- Sign in with Google (for sub-apps) -->
  <button class="btn-google" type="button">
    <svg width="18" height="18" viewBox="0 0 18 18">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
      <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Sign in with a different Google Account
  </button>

</div>

<!-- Footer -->
<footer>
  <a href="#">English (United States)</a>
  <a href="#">Help</a>
  <a href="#">Privacy</a>
  <a href="#">Terms</a>
</footer>

<script>
  const nextBtn = document.getElementById('next-btn');
  const emailInput = document.getElementById('email');
  const passwordWrap = document.getElementById('password-wrap');
  const forgotWrap = document.getElementById('forgot-wrap');
  const passwordInput = document.getElementById('password');
  const eyeBtn = document.getElementById('eye-btn');
  let step = 'email';

  nextBtn.addEventListener('click', () => {
    if (step === 'email') {
      if (!emailInput.value.trim()) {
        emailInput.style.borderColor = '#d93025';
        emailInput.style.borderWidth = '2px';
        emailInput.focus();
        return;
      }
      // Move to password step
      emailInput.closest('.field').style.display = 'none';
      document.querySelector('.helper-links').style.display = 'none';
      document.querySelector('p[style]').style.display = 'none';
      passwordWrap.style.display = 'block';
      forgotWrap.style.display = 'block';
      passwordInput.focus();
      step = 'password';
    } else {
      if (!passwordInput.value.trim()) {
        passwordInput.style.borderColor = '#d93025';
        passwordInput.style.borderWidth = '2px';
        passwordInput.focus();
        return;
      }
      nextBtn.textContent = '...';
      setTimeout(() => { nextBtn.textContent = 'Next'; }, 1500);
    }
  });

  // Eye toggle
  eyeBtn.addEventListener('click', () => {
    const isHidden = passwordInput.type === 'password';
    passwordInput.type = isHidden ? 'text' : 'password';
    eyeBtn.innerHTML = isHidden
      ? `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
      : `<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>`;
  });

  // Reset error border on input
  [emailInput, passwordInput].forEach(el => {
    el.addEventListener('input', () => {
      el.style.borderColor = '';
      el.style.borderWidth = '';
    });
  });
</script>
</body>
</html>
